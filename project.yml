name: SplitSet
options:
  bundleIdPrefix: com.tlmorgen
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "16.0"

packages:
  SplitSetCore:
    path: SplitSetCore

targets:
  SplitSet:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tlmorgen.splitset
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 8XN77HKABA
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"
        VERSIONING_SYSTEM: apple-generic
    sources:
      - path: SplitSet/Sources
    entitlements:
      path: SplitSet/Resources/SplitSet.entitlements
      properties:
        com.apple.developer.healthkit: true
    dependencies:
      - package: SplitSetCore
      - sdk: WatchConnectivity.framework
      - target: SplitSetWatch
    info:
      path: SplitSet/Info.plist
      properties:
        CFBundleDisplayName: SplitSet
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UILaunchScreen:
          UIColorName: ""
        ITSAppUsesNonExemptEncryption: false
        LSSupportsOpeningDocumentsInPlace: true
        NSHealthShareUsageDescription: "SplitSet reads heart rate during workouts."
        NSHealthUpdateUsageDescription: "SplitSet saves workout data to Health."
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.tlmorgen.splitset.workout
            UTTypeDescription: SplitSet Workout
            UTTypeConformsTo:
              - public.json
            UTTypeTagSpecification:
              public.filename-extension:
                - splitset
        CFBundleDocumentTypes:
          - CFBundleTypeName: SplitSet Workout
            LSHandlerRank: Owner
            LSItemContentTypes:
              - com.tlmorgen.splitset.workout

  SplitSetWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: SplitSetWatch/Sources
    entitlements:
      path: SplitSetWatch/Resources/SplitSetWatch.entitlements
      properties:
        com.apple.developer.healthkit: true
    dependencies:
      - package: SplitSetCore
      - sdk: WatchConnectivity.framework
      - sdk: HealthKit.framework
    info:
      path: SplitSetWatch/Info.plist
      properties:
        CFBundleDisplayName: SplitSet
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.tlmorgen.splitset
        NSHealthShareUsageDescription: "SplitSet reads heart rate during workouts."
        NSHealthUpdateUsageDescription: "SplitSet saves workout data to Health."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tlmorgen.splitset.watchkitapp
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 8XN77HKABA
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"
        VERSIONING_SYSTEM: apple-generic
